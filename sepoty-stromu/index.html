<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>O.R.I.O.N. | Šepoty stromů</title>
    <link rel="stylesheet" href="../styles.css?v=assets-relative-77">
  </head>
  <body>
    <div class="progress" aria-hidden="true"><div id="progressFill"></div></div>
    <div class="scanlines" aria-hidden="true"></div>
    <div id="slideCounter" class="slide-counter">01 / 50</div>
    <main class="game-main shell">
      <section class="stage" aria-live="polite">
        <div id="slideRoot" class="slide"></div>
        <nav class="nav">
          <button id="backBtn" class="nav-btn" type="button">Zpět</button>
          <button id="forwardBtn" class="nav-btn" type="button">Dopředu</button>
        </nav>
      </section>
    </main>
    <button id="resetBtn" class="ghost-btn" type="button" hidden>Resetovat postup</button>
    <span id="slideType" hidden>SYSTÉM</span>
    <span id="chapterLabel" hidden>Inicializace</span>

    <script src="../data.js?v=assets-relative-77"></script>
    <script src="../app.js?v=assets-relative-77"></script>
  </body>
</html>
